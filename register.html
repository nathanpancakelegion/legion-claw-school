<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Legion Claw School</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192.png">
    <link rel="apple-touch-icon" href="/images/favicon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: #000;
            color: #fff;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .orb { position: absolute; border-radius: 50%; opacity: 0.15; filter: blur(80px); }
        .o1 { width: 400px; height: 400px; background: rgba(255, 182, 193, 0.5); top: -100px; left: -100px; animation: float 20s ease-in-out infinite; }
        .o2 { width: 350px; height: 350px; background: rgba(173, 216, 230, 0.5); bottom: -50px; right: -50px; animation: float 25s ease-in-out infinite reverse; }
        .o3 { width: 300px; height: 300px; background: rgba(221, 160, 221, 0.5); top: 50%; right: -100px; animation: float 22s ease-in-out infinite; }
        .o4 { width: 250px; height: 250px; background: rgba(255, 218, 185, 0.5); bottom: 20%; left: 10%; animation: float 28s ease-in-out infinite reverse; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
        }

        header {
            position: relative;
            z-index: 10;
            padding: 2rem;
            display: flex;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            letter-spacing: 2px;
        }
        .logo:hover { opacity: 0.8; }
        .logo-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        main {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-page {
            width: 100%;
            max-width: 500px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .auth-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: 1px;
        }

        .auth-sub {
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 2rem 0;
            font-size: 1rem;
            line-height: 1.5;
        }

        .auth-error {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.5);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        .auth-error.show { display: block; }

        .form-group { margin-bottom: 1.5rem; }

        .form-input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .form-input-row > div { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }
        .form-input::placeholder { color: rgba(255, 255, 255, 0.4); }

        .form-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .form-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
        }
        .form-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .auth-link a:hover { color: #764ba2; }

        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        footer a { color: rgba(255, 255, 255, 0.7); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .auth-card { padding: 2rem 1.5rem; }
            .auth-title { font-size: 2rem; }
            .form-input-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="orb o1"></div>
        <div class="orb o2"></div>
        <div class="orb o3"></div>
        <div class="orb o4"></div>
        <div class="stars"></div>
    </div>

    <header>
        <a href="/" class="logo">
            <span class="logo-icon"><img src="/images/legion-icon-white.png" alt="Legion"></span>
            LEGION CLAW SCHOOL
        </a>
    </header>

    <main>
        <div class="auth-page">
            <div class="auth-card">
                <h1 class="auth-title">Start Learning</h1>
                <p class="auth-sub">Create your free account to access Modules 00 & 01.</p>
                <div id="auth-error" class="auth-error"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="pw" class="form-input" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <div class="form-group form-input-row">
                        <div>
                            <label class="form-label">City (optional)</label>
                            <input type="text" id="city" class="form-input" placeholder="Your city">
                        </div>
                        <div>
                            <label class="form-label">State (optional)</label>
                            <input type="text" id="state" class="form-input" placeholder="e.g. TX">
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="form-btn">Create Free Account</button>
                </form>
                <p class="auth-link">Already have an account? <a href="/login.html">Log in</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Legion Claw School. All rights reserved. | <a href="/privacy.html">Privacy</a> | <a href="/terms.html">Terms</a></p>
    </footer>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const registerForm = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');
        const authError = document.getElementById('auth-error');

        // Check if user is already logged in
        window.addEventListener('load', async () => {
            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                console.error('Session check error:', err);
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.classList.remove('show');
            authError.textContent = '';

            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('pw').value;
            const name = document.getElementById('name').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();

            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Creating account...';

            try {
                await registerUser(email, pw, name, city, state);

                // Notify Zapier to trigger email drip sequence (fire-and-forget)
                fetch('https://hooks.zapier.com/hooks/catch/26999336/unmwfpp/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'email=' + encodeURIComponent(email) + '&first_name=' + encodeURIComponent(name.split(' ')[0]) + '&created_at=' + encodeURIComponent(new Date().toISOString())
                }).catch(function() {}); // Silent fail — don't block registration

                // Get redirect URL from query params if present
                const params = new URLSearchParams(window.location.search);
                const redirectTo = params.get('redirect') || '/dashboard.html';
                window.location.href = redirectTo;
            } catch (err) {
                authError.textContent = err.message || 'Registration failed. Please try again.';
                authError.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
